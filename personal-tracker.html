<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
        <span class="dark-mode-icon"></span>
    </button>

    <div class="container" id="personal-tracker">
        <div class="tracker-header">
            <button id="back-from-personal" class="back-btn" onclick="history.back()">← BACK</button>
            <h1>Individual Expense Tracker</h1>
        </div>
        <p class="subtitle">Track your personal expenses</p>
        <hr class="section-divider">

        <div class="summary-section">
            <div class="summary-card">
                <h3>Total Expenses</h3>
                <p class="total-amount">₹<span id="totalAmount">0.00</span></p>
            </div>
        </div>

        <div class="main-content">
            <!-- Add Expense Form -->
            <section class="add-expense-section">
                <h2>Add New Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="expenseName">Expense Name</label>
                        <input type="text" id="expenseName" placeholder="e.g., Lunch at restaurant" required>
                    </div>

                    <div class="form-group">
                        <label for="expenseAmount">Amount (₹)</label>
                        <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="expenseCategory">Category</label>
                        <select id="expenseCategory">
                            <option value="Food">Food</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                            <option value="custom">+ Add Custom Category</option>
                        </select>
                    </div>

                    <div class="form-group custom-category-group" id="customCategoryGroup" style="display: none;">
                        <label for="customCategory">Custom Category Name</label>
                        <input type="text" id="customCategory" placeholder="Enter category name">
                    </div>

                    <button type="submit" class="add-member-btn">Add Expense</button>
                </form>
            </section>

            <!-- Expenses List -->
            <section class="expenses-list-section">
                <div class="section-header">
                    <h2>Recent Expenses</h2>
                    <button class="add-member-btn small-btn" id="clearAllBtn">Clear All</button>
                </div>

                <!-- Category Filter -->
                <div class="filter-section">
                    <label for="categoryFilter">Filter by Category:</label>
                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                    </select>
                </div>

                <!-- Category Summary -->
                <div class="category-summary" id="categorySummary"></div>

                <!-- Expenses Table -->
                <div class="expenses-table-container">
                    <table class="expenses-table" id="expensesTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expensesTableBody">
                            <!-- Expenses will be added here dynamically -->
                        </tbody>
                    </table>
                    <div class="no-expenses" id="noExpenses">
                        <p>No expenses recorded yet. Add your first expense above!</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="personal-script.js"></script>
</body>
</html>
