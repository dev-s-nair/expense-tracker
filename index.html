<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <!-- Dark Mode Toggle -->
    <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
        <span class="dark-mode-icon"></span>
    </button>

    <!-- Intro Screen -->
    <div id="intro-screen" class="intro-screen">
        <div class="intro-bg-bottom-left"></div>
        <div class="intro-bg-bottom-right"></div>
        <div class="intro-bg-center"></div>
        <div class="intro-bg-top-center"></div>
        <div class="intro-bg-left-center"></div>
        <div class="intro-bg-right-center"></div>
        <div class="intro-bg-bottom-center"></div>
        <div class="intro-content">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23fff' width='100' height='100' rx='15'/%3E%3Ctext x='50' y='60' font-family='Arial' font-size='50' font-weight='bold' text-anchor='middle' fill='%23000'%3E₹%3C/text%3E%3C/svg%3E" alt="Expense Tracker Logo" class="intro-logo">
            <h1 class="intro-title">EXPENSE<br>TRACKER</h1>
            <p class="intro-subtitle">Track. Split. Manage. Your way.</p>
            <button id="get-started-btn" class="get-started-btn">GET STARTED →</button>
        </div>
    </div>

    <script src="intro-script.js"></script>
</body>
</html>
